name: CI/CD Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run unit tests
        run: node tests/calculator.test.js

      - name: Deploy via FTP
        run: |
          lftp -c "
            open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }}
            rm -rf /public_html/index.html
            rm -rf /public_html/calculator.html
            rm -rf /public_html/assets
            put index.html -o /public_html/index.html
            put calculator.html -o /public_html/calculator.html
            mirror -R --delete --verbose assets/ /public_html/assets/
            quit
          "
