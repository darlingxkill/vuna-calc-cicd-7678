<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUNA Calculator</title>
  <style>
    .back-link { position: fixed; top: 20px; left: 20px; z-index: 10; text-decoration: none; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); color: #8a6b78; padding: 8px 18px; border-radius: 40px; font-size: 14px; font-weight: 600; border: 1px solid rgba(255,200,210,0.3); transition: all .2s ease; display: flex; align-items: center; gap: 6px; }
    .back-link:hover { background: rgba(255,255,255,0.9); color: #5c3d4a; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(200,120,150,0.15); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #fef0f3, #fce4ec, #f8d4e0, #f2c4d2); }
    .calc-wrap { width: 100%; max-width: 380px; padding: 16px; }
    .header { text-align: center; margin-bottom: 16px; }
    .header h4 { color: #5c3d4a; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-size: 1.1rem; }
    .header p { color: #8a6b78; font-size: .8rem; font-style: italic; }
    .card { background: rgba(255,255,255,0.78); backdrop-filter: blur(16px); border-radius: 24px; box-shadow: 0 16px 48px rgba(200,120,150,0.18); padding: 24px; border: 1px solid rgba(255,200,210,0.35); }
    .display { background: rgba(255,255,255,0.6); border-radius: 16px; padding: 16px 20px; margin-bottom: 20px; box-shadow: inset 0 2px 6px rgba(200,120,150,0.08); }
    #result { width: 100%; text-align: right; font-size: 34px; font-weight: 600; border: none; background: transparent; color: #4a2a38; outline: none; box-shadow: none; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .grid button { height: 60px; border-radius: 14px; font-size: 20px; font-weight: 600; border: none; cursor: pointer; transition: all .15s ease; display: flex; align-items: center; justify-content: center; }
    .grid button:active { transform: scale(0.93); }
    .num { background: #fff; color: #4a2a38; box-shadow: 0 2px 8px rgba(200,120,150,0.08); }
    .num:hover { background: #fef0f3; }
    .op { background: #eec0d0; color: #8a3858; box-shadow: 0 2px 8px rgba(200,120,150,0.1); }
    .op:hover { background: #e6b0c4; }
    .util { background: #f8dce6; color: #a04868; box-shadow: 0 2px 8px rgba(200,120,150,0.08); }
    .util:hover { background: #f0ccda; }
    .eq { background: linear-gradient(135deg, #e892a8, #d47a94); color: #fff; box-shadow: 0 4px 14px rgba(200,100,130,0.3); }
    .eq:hover { background: linear-gradient(135deg, #d47a94, #c06884); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,100,130,0.35); }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Back</a>
  <div class="calc-wrap">
    <div class="header">
      <h4>VUNA Calculator</h4>
      <p>Created by set 2025/26 Software Engineering</p>
    </div>
    <div class="card">
      <div class="display">
        <input type="text" id="result" placeholder="0" readonly />
      </div>
      <div class="grid">
        <button class="num" onclick="appendToResult(7)">7</button>
        <button class="num" onclick="appendToResult(8)">8</button>
        <button class="num" onclick="appendToResult(9)">9</button>
        <button class="op" onclick="operatorToResult('/')">÷</button>
        <button class="num" onclick="appendToResult(4)">4</button>
        <button class="num" onclick="appendToResult(5)">5</button>
        <button class="num" onclick="appendToResult(6)">6</button>
        <button class="op" onclick="operatorToResult('*')">×</button>
        <button class="num" onclick="appendToResult(1)">1</button>
        <button class="num" onclick="appendToResult(2)">2</button>
        <button class="num" onclick="appendToResult(3)">3</button>
        <button class="op" onclick="operatorToResult('-')">−</button>
        <button class="num" onclick="appendToResult(0)">0</button>
        <button class="num" onclick="appendToResult('.')">.</button>
        <button class="num" onclick="appendPi()">π</button>
        <button class="op" onclick="operatorToResult('+')">+</button>
        <button class="util" onclick="clearResult()">AC</button>
        <button class="util" onclick="backspace()">CE</button>
        <button class="util" onclick="backspace()">⌫</button>
        <button class="eq" onclick="calculateResult()">=</button>
      </div>
    </div>
  </div>
  <script src="assets/js/script.js"></script>
</body>
</html>
