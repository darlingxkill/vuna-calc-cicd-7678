<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jedidah — VUNA Calc</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />

  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .home-card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); padding: 3rem 2.5rem; text-align: center; max-width: 480px; border: 1px solid rgba(255,255,255,0.3); }
    .home-card h1 { font-weight: 700; font-size: 2rem; color: #212529; margin-bottom: .5rem; }
    .home-card p { color: #6c757d; margin-bottom: 2rem; }
    .launch-btn { display: inline-block; background: var(--primary-color); color: #fff; padding: .75rem 2.5rem; border-radius: 40px; font-size: 1.1rem; font-weight: 600; text-decoration: none; transition: all .2s ease; box-shadow: 0 6px 16px rgba(13,110,253,0.25); }
    .launch-btn:hover { background: #0b5ed7; transform: translateY(-2px); color: #fff; box-shadow: 0 10px 24px rgba(13,110,253,0.35); }
    .footer-text { font-size: .8rem; color: #adb5bd; margin-top: 2rem; }
    body.dark-mode .home-card h1 { color: #e0e0e0; }
  </style>
</head>
